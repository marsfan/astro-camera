<html>

<head>
    <title>Astrocamera</title>
</head>

<body>
    <img src="stream.mjpg" width="640" height="480" />

    <form method="GET" action="/take">
        <input type="submit" value="Take Photo" />
    </form>
    <h2>Exposure Control </h2>
    <form method="GET" action="/exposure">
        <input type="checkbox" name="autoex" id="autoex" {{autoEx}} />
        <label for="autoex">Auto Exposure</label>
        <br />
        <input type="text" id="exval" name="exval" placeholder="{{exposure}}" value="" />
        <label for="exval">Exposure</label>
        <br>
        <input type="text" id="gainval" name="gainval" placeholder="{{gain}}" value="" />
        <label for="gainval">Gain</label>
        <br>
        <input type="range" id="ev" name="ev" value="{{currentEv}}" min="-8" max="8" step="0.1" />
        <label for="ev">EV</label>
        <br />
        <input type="submit" value="Set Options" />
    </form>
    <form method="GET" action="/reset">
        <input type="submit" value="Reset Options" />
    </form>
    <form method="GET" action="/debug">
        <input type="submit" value="Dump Stuff" />
    </form>
</body>

</html>
